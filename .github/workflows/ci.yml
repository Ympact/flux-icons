name: CI

on:
  push:
    branches: ["dev","main","v1","v2"]
  pull_request:
    branches: ["v1","v2"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4, 8.5]
        laravel: ['11', '12', '13']
        flux: ['1', '2']
        exclude:
          - laravel: '13'
            flux: '1'
        
        include:
          - laravel: '13'
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, json, zip
          coverage: none

      - name: Setup composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-flux${{ matrix.flux }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-flux${{ matrix.flux }}-
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-php${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Resolve matrix dependencies
        run: |
          echo "Installing Laravel: ${{ matrix.laravel }}"
          composer require "laravel/framework:^${{ matrix.laravel }}" --no-update --no-interaction
          echo "Installing livewire/flux variant: ${{ matrix.flux }}"
          composer require "livewire/flux:^${{ matrix.flux }}" --no-update --no-interaction || true

          if [ "${{ matrix.flux }}" = "1" ]; then
            echo "Removing livewire/blaze for livewire/flux v1 compatibility"
            composer remove --dev livewire/blaze --no-update --no-interaction
          fi

          composer update --with-all-dependencies --no-interaction --prefer-dist

      - name: Run Pint (style check)
        run: ./vendor/bin/pint --test || true
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse src -c phpstan.neon --no-progress

      - name: Run tests (Pest)
        run: ./vendor/bin/pest --colors=always -v
